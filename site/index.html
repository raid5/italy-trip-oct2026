<!DOCTYPE html>
<html lang="en" data-design="poster">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Southern Italy · Oct 2026</title>
  <meta name="description" content="An interactive guide to Rome, Naples & Positano — food, culture, art, coast & more." />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/designs/poster.css" />
  <link rel="stylesheet" href="css/designs/fieldguide.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#/" data-nav>
      <span class="brand-mark">✦</span>
      <span class="brand-text">Southern Italy<small>October 2026</small></span>
    </a>
    <nav class="main-nav" id="main-nav"><!-- city/section links injected --></nav>
    <div class="header-tools">
      <div class="design-switch" id="design-switch" title="Switch the design">
        <button data-design-pick="poster" title="Poster / Full-screen">Poster</button>
        <button data-design-pick="fieldguide" title="Field Guide / Atlas">Field Guide</button>
      </div>
    </div>
  </header>

  <main id="view"><!-- rendered by app.js --></main>

  <footer class="site-footer">
    <p>Content from Wikivoyage &amp; Wikipedia (CC BY-SA) · Photos via Wikimedia Commons.
    <a href="#/credits" data-nav>Photo credits &amp; licenses →</a></p>
  </footer>

  <div class="noscript-data" id="no-data" hidden>
    <h1>Data not built yet</h1>
    <p>Run <code>pnpm build</code> to generate <code>js/data.js</code>, then reload.</p>
  </div>

  <script src="js/data.js"></script>
  <script src="js/map.js"></script>
  <script src="js/designs/poster.js"></script>
  <script src="js/designs/fieldguide.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
